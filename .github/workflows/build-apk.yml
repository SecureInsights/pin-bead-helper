name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Run web tests
        run: npm test

      - name: Sync web assets
        run: |
          mkdir -p android/app/src/main/assets/www/assets
          cp app.js core.js index.html styles.css sw.js manifest.webmanifest android/app/src/main/assets/www/
          cp -R assets/. android/app/src/main/assets/www/assets/

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pin-bead-helper-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
